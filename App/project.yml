name: Bike360
options:
  bundleIdPrefix: com.bike360
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Pipeline:
    path: ../

targets:
  Bike360:
    type: application
    platform: iOS
    # xcodegen has no target-level `resources` key — it classifies every
    # path under `sources` automatically (.swift → compile, .json → Copy
    # Bundle Resources). So Resources must live here too.
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - package: Pipeline
        product: Pipeline
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.bike360.app
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        # Swift 5 language mode for the UI layer — avoids strict-concurrency
        # friction in SceneKit/SwiftUI glue. Pipeline keeps its own v6 mode.
        SWIFT_VERSION: "5.0"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
